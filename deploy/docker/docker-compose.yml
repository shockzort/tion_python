# Альтернатива bare systemd. BLE требует host-сети и DBus хоста (BlueZ).
# Запуск из корня: docker compose -f deploy/docker/docker-compose.yml up -d

services:
  easy-breezy:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    network_mode: host          # BLE + LAN-доступ
    restart: unless-stopped
    env_file: ../../.env
    volumes:
      - /var/run/dbus:/var/run/dbus   # BlueZ
      - data:/app/server/data
    environment:
      EB_DATA_DIR: /app/server/data

  frpc:
    image: snowdreamtech/frpc:latest
    profiles: [tunnel]
    restart: unless-stopped
    network_mode: host
    volumes:
      - ../frp/frpc.toml.example:/etc/frp/frpc.toml:ro  # заменить на боевой

volumes:
  data:
